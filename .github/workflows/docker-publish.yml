name: Docker Publish

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io 
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/alibaba-champion-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/alibaba-champion-frontend
  APP_DIR: /home/${{ secrets.SSH_USERNAME }}/alibaba-champion

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_GHCR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker compose files ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml,docker-compose.infra.yml"
          target: ${{ env.APP_DIR }}

      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            echo "🔐 Login GHCR"
            echo "${{ secrets.PAT_GHCR }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            echo "📝 Tulis .env ke VPS"
            mkdir -p ${{ env.APP_DIR }}
            cat > ${{ env.APP_DIR }}/.env <<EOF
            ${{ secrets.ENV_BACKEND }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:latest
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:latest
            EOF

            cd ${{ env.APP_DIR }}

            echo "📥 Pull image terbaru"
            docker compose pull

            echo "🚀 Jalankan via docker compose"
            docker compose up -d --remove-orphans

            echo "✅ Deploy selesai"
